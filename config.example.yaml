env: dev

ark:
  api_key: "${ARK_API_KEY}"
  base_url: "https://ark.cn-beijing.volces.com/api/v3"
  seedream_model: "doubao-seedream-4-5-251128"
  text_model: "doubao-seed-2-0-lite-260215"
  text_temperature: 0.3
  image_size: "2K"
  response_format: "b64_json"
  stream: false
  watermark: false

ziniu:
  base_url: ""
  api_key: ""
  browser_profile_id: ""

feishu:
  base_url: "https://open.feishu.cn"
  webhook_url: ""
  app_id: "${FEISHU_APP_ID}"
  app_secret: "${FEISHU_APP_SECRET}"
  image_task_app_token: "${FEISHU_IMAGE_TASK_APP_TOKEN}"
  image_task_table_id: "${FEISHU_IMAGE_TASK_TABLE_ID}"
  image_task_view_id: "${FEISHU_IMAGE_TASK_VIEW_ID}"

paths:
  assets_root: "./runtime/assets"
  logs_root: "./runtime/logs"
  screenshots_root: "./runtime/screenshots"

publish:
  mode: "draft"
  retry_times: 2
  timeout_seconds: 30
